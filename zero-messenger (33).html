<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Zero</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080808;--bg2:#111;--bg3:#1a1a1a;--bg4:#222;
  --b:#242424;--b2:#303030;
  --t:#efefef;--t2:#888;--t3:#444;
  --a:#fff;--at:#080808;
  --bi:#1c1c1c;--bo:#efefef;--bot:#080808;
  --green:#34d399;--red:#f87171;
  --nav:62px;--hdr:58px;--r:18px;--rs:11px;
  --font:'DM Sans',sans-serif;--mono:'Geist Mono',monospace;
}
.light{--bg:#f0f0f0;--bg2:#fafafa;--bg3:#e8e8e8;--bg4:#ddd;--b:#d8d8d8;--b2:#c8c8c8;--t:#0e0e0e;--t2:#5a5a5a;--t3:#aaa;--a:#0e0e0e;--at:#fafafa;--bi:#e2e2e2;--bo:#0e0e0e;--bot:#fafafa;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--t);font-family:var(--font);font-size:15px;-webkit-font-smoothing:antialiased}

#ld{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .35s}
#ld.hide{opacity:0;pointer-events:none}
.ldi{display:flex;flex-direction:column;align-items:center;gap:16px}
.ld-ico{width:60px;height:60px;background:var(--a);border-radius:18px;display:flex;align-items:center;justify-content:center}
.ld-ico svg{width:30px;height:30px;color:var(--at)}
.ld-name{font-family:var(--mono);font-size:20px;letter-spacing:.12em}
.ld-dots{display:flex;gap:5px}
.ld-dots i{display:block;width:5px;height:5px;background:var(--t3);border-radius:50%;animation:pulse 1.3s ease infinite}
.ld-dots i:nth-child(2){animation-delay:.2s}
.ld-dots i:nth-child(3){animation-delay:.4s}

.sc{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;overflow:hidden}
.sc.on{display:flex}

#s-auth{justify-content:center;align-items:center;overflow-y:auto}
.aw{width:100%;max-width:340px;padding:28px 20px}
.a-logo{text-align:center;margin-bottom:30px}
.a-ico{width:52px;height:52px;background:var(--a);border-radius:14px;margin:0 auto 10px;display:flex;align-items:center;justify-content:center}
.a-ico svg{width:26px;height:26px;color:var(--at)}
.a-logo h1{font-family:var(--mono);font-size:20px;font-weight:400;letter-spacing:.1em}
.a-logo p{font-size:12px;color:var(--t2);margin-top:3px}
.a-tabs{display:flex;background:var(--bg3);border-radius:var(--rs);padding:3px;margin-bottom:20px}
.a-tab{flex:1;text-align:center;padding:9px 0;border-radius:9px;font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;transition:.15s;user-select:none}
.a-tab.on{background:var(--bg2);color:var(--t);box-shadow:0 1px 5px rgba(0,0,0,.4)}
.af{display:none}
.af.on{display:block}
.fld{margin-bottom:12px}
.fld label{display:block;font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.fld input{width:100%;background:var(--bg3);border:1.5px solid var(--b);border-radius:var(--rs);padding:12px 13px;font-size:14px;color:var(--t);font-family:var(--font);outline:none;transition:.15s;-webkit-appearance:none}
.fld input:focus{border-color:var(--b2);background:var(--bg4)}
.fld input::placeholder{color:var(--t3)}
.btn{width:100%;background:var(--a);color:var(--at);border:none;border-radius:var(--rs);padding:13px;font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer;transition:.12s;margin-top:2px}
.btn:active{opacity:.82;transform:scale(.98)}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none}
.btn-ghost{background:transparent;border:1.5px solid var(--b2);color:var(--t)}
.btn-red{background:transparent;border:1.5px solid rgba(248,113,113,.35);color:var(--red)}
.sep{display:flex;align-items:center;gap:10px;margin:12px 0;color:var(--t3);font-size:11px}
.sep::before,.sep::after{content:'';flex:1;height:1px;background:var(--b)}
.emsg{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);color:var(--red);font-size:12px;padding:9px 12px;border-radius:var(--rs);margin-bottom:10px;display:none}
.emsg.on{display:block}
.fgt{text-align:center;margin-top:11px}
.fgt a{font-size:12px;color:var(--t2);text-decoration:none}

.hdr{height:var(--hdr);display:flex;align-items:center;padding:0 10px;background:var(--bg);border-bottom:1px solid var(--b);flex-shrink:0;gap:3px}
.hdr-t{font-size:17px;font-weight:600;flex:1;padding:0 5px}
.hb{width:38px;height:38px;border:none;background:transparent;color:var(--t);cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:10px;flex-shrink:0;transition:.12s}
.hb:active{background:var(--bg3)}
.hb svg{width:20px;height:20px}

.nav{height:var(--nav);background:var(--bg2);border-top:1px solid var(--b);display:flex;flex-shrink:0}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;border:none;background:transparent;color:var(--t3);transition:.15s;position:relative;font-family:var(--font)}
.nb svg{width:21px;height:21px}
.nb span{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.nb.on{color:var(--a)}
.nbadge{position:absolute;top:7px;right:calc(50% - 20px);background:var(--red);color:#fff;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:none;align-items:center;justify-content:center;padding:0 4px}
.nbadge.on{display:flex}

.scroll{flex:1;overflow-y:auto;overscroll-behavior:contain}
.scroll::-webkit-scrollbar{width:0}

.srch{padding:8px 12px;background:var(--bg)}
.srch-in{position:relative}
.srch-in svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--t3);pointer-events:none}
.srch-in input{width:100%;background:var(--bg3);border:1px solid var(--b);border-radius:var(--rs);padding:10px 12px 10px 32px;font-size:13px;color:var(--t);font-family:var(--font);outline:none}
.srch-in input::placeholder{color:var(--t3)}

.ci{display:flex;align-items:center;gap:11px;padding:10px 13px;cursor:pointer;transition:.1s;user-select:none}
.ci:active{background:var(--bg3)}
.ava{width:48px;height:48px;border-radius:50%;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:600;color:#fff;position:relative;background:var(--bg3)}
.ava img{width:100%;height:100%;object-fit:cover}
.ava-s{width:36px;height:36px;border-radius:50%;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff;background:var(--bg3)}
.ava-s img{width:100%;height:100%;object-fit:cover}
.odot{position:absolute;bottom:1px;right:1px;width:11px;height:11px;background:var(--green);border-radius:50%;border:2px solid var(--bg)}
.ci-r{flex:1;min-width:0}
.ci-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.ci-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-time{font-size:10px;color:var(--t3);flex-shrink:0;margin-left:6px}
.ci-bot{display:flex;justify-content:space-between;align-items:center}
.ci-last{font-size:13px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.ci-badge{background:var(--a);color:var(--at);font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;flex-shrink:0;margin-left:5px}

.fab{position:fixed;bottom:calc(var(--nav)+14px);right:14px;width:50px;height:50px;background:var(--a);color:var(--at);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.4);transition:.15s;z-index:20}
.fab:active{transform:scale(.91)}
.fab svg{width:20px;height:20px}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px;color:var(--t3);padding:40px;text-align:center}
.empty svg{width:42px;height:42px;opacity:.2}
.empty p{font-size:13px;line-height:1.5}

#s-dlg{z-index:30}
.dlg-hdr{height:var(--hdr);display:flex;align-items:center;padding:0 8px;background:var(--bg);border-bottom:1px solid var(--b);flex-shrink:0;gap:7px}
.dlg-inf{flex:1;min-width:0}
.dlg-name{font-size:15px;font-weight:600}
.dlg-st{font-size:11px;color:var(--t2)}
.dlg-st.on{color:var(--green)}

.msgs{flex:1;overflow-y:auto;padding:10px 11px;display:flex;flex-direction:column;gap:2px}
.msgs::-webkit-scrollbar{width:0}
.datediv{text-align:center;margin:10px 0 6px}
.datediv span{font-size:10px;color:var(--t3);background:var(--bg);padding:3px 10px;border-radius:20px}
.mw{display:flex;flex-direction:column;max-width:76%;animation:fadeUp .12s ease}
.mw.out{align-self:flex-end;align-items:flex-end}
.mw.in{align-self:flex-start;align-items:flex-start}
.bbl{padding:9px 13px;border-radius:18px;font-size:14px;line-height:1.48;word-break:break-word}
.mw.out .bbl{background:var(--bo);color:var(--bot);border-bottom-right-radius:4px}
.mw.in .bbl{background:var(--bi);color:var(--t);border-bottom-left-radius:4px}
.mmeta{display:flex;align-items:center;gap:4px;padding:2px 2px 0}
.mtime{font-size:10px;color:var(--t3)}
.rdot svg{width:13px;height:13px;color:var(--t3)}
.rdot.done svg{color:#60a5fa}
.bimg{border-radius:13px;overflow:hidden;max-width:200px;cursor:pointer}
.bimg img{width:100%;display:block}
.rcts{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px}
.rchip{background:var(--bg3);border:1px solid var(--b);border-radius:18px;padding:2px 7px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:3px;transition:.1s}
.rchip:active{transform:scale(.9)}
.rchip span{font-size:10px;color:var(--t2)}

.irow{display:flex;align-items:flex-end;gap:7px;padding:9px 10px;background:var(--bg);border-top:1px solid var(--b);flex-shrink:0}
.att{width:35px;height:35px;background:transparent;border:1.5px solid var(--b2);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:var(--t2);transition:.12s}
.att:active{background:var(--bg3)}
.att svg{width:15px;height:15px}
.mfld{flex:1;background:var(--bg3);border:1.5px solid var(--b);border-radius:17px;padding:9px 13px;font-size:14px;color:var(--t);font-family:var(--font);outline:none;max-height:110px;overflow-y:auto;resize:none;line-height:1.4;transition:.13s}
.mfld::-webkit-scrollbar{width:0}
.mfld:focus{border-color:var(--b2)}
.mfld:empty::before{content:attr(placeholder);color:var(--t3);pointer-events:none}
.sbtn{width:37px;height:37px;background:var(--a);color:var(--at);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:.12s}
.sbtn:active{transform:scale(.88)}
.sbtn:disabled{opacity:.25;cursor:not-allowed;transform:none}
.sbtn svg{width:15px;height:15px}

.rpick{position:absolute;background:var(--bg2);border:1px solid var(--b2);border-radius:var(--rs);padding:8px 10px;display:flex;gap:8px;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,.7);bottom:calc(100% + 6px);left:0;pointer-events:none;opacity:0;transform:scale(.88) translateY(4px);transition:.14s;transform-origin:bottom left}
.rpick.on{pointer-events:all;opacity:1;transform:scale(1) translateY(0)}
.rpick span{font-size:22px;cursor:pointer;transition:.1s;user-select:none}
.rpick span:active{transform:scale(1.3)}

.ovl{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:50;display:none;align-items:flex-end;backdrop-filter:blur(6px)}
.ovl.on{display:flex}
.sheet{background:var(--bg2);border-radius:22px 22px 0 0;padding:18px 16px 32px;width:100%;animation:slideUp .22s cubic-bezier(.32,1,.32,1)}
.sh-h{width:36px;height:4px;background:var(--b2);border-radius:2px;margin:0 auto 16px}
.sh-t{font-size:16px;font-weight:600;margin-bottom:14px}
.merr{font-size:12px;color:var(--red);margin-bottom:8px;padding:8px 11px;background:rgba(248,113,113,.08);border-radius:8px;border:1px solid rgba(248,113,113,.2);display:none}
.merr.on{display:block}
.mres{background:var(--bg3);border-radius:var(--rs);padding:12px;display:none;align-items:center;gap:11px;margin-bottom:13px}
.mres.on{display:flex}
.mr-n{font-size:14px;font-weight:600}
.mr-id{font-size:12px;color:var(--t2);font-family:var(--mono);margin-top:1px}

.ph{display:flex;flex-direction:column;align-items:center;padding:28px 16px 16px}
.paw{position:relative;margin-bottom:12px}
.pa{width:82px;height:82px;border-radius:50%;background:var(--bg3);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:600;color:#fff}
.pa img{width:100%;height:100%;object-fit:cover}
.pa-edit{position:absolute;bottom:0;right:0;width:26px;height:26px;background:var(--a);color:var(--at);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer}
.pa-edit svg{width:12px;height:12px}
.p-name{font-size:19px;font-weight:600;margin-bottom:8px}
.id-chip{background:var(--bg3);border:1px solid var(--b);border-radius:20px;padding:5px 14px;display:flex;align-items:center;gap:7px;cursor:pointer;transition:.13s;user-select:none}
.id-chip:active{background:var(--bg4)}
.id-num{font-family:var(--mono);font-size:15px;font-weight:500}
.id-lbl{font-size:10px;color:var(--t2);font-family:var(--mono)}
.id-chip svg{width:12px;height:12px;color:var(--t3)}

.sec{padding:0 12px 8px}
.sec-t{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;padding:13px 0 7px}
.row{display:flex;align-items:center;gap:11px;padding:12px;background:var(--bg2);border-radius:var(--rs);margin-bottom:2px;cursor:pointer;transition:.1s}
.row:active{background:var(--bg3)}
.row-ico{width:32px;height:32px;background:var(--bg3);border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--t2);flex-shrink:0}
.row-ico svg{width:15px;height:15px}
.row-t{flex:1}
.row-l{font-size:14px;font-weight:500}
.row-s{font-size:12px;color:var(--t2);margin-top:1px}
.row-arr svg{width:14px;height:14px;color:var(--t3)}
.tog{width:42px;height:24px;background:var(--bg4);border-radius:12px;position:relative;cursor:pointer;transition:.18s;flex-shrink:0;border:none}
.tog.on{background:var(--a)}
.tog::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;background:var(--bg2);border-radius:50%;transition:.18s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.tog.on::after{left:20px}
.th-btns{display:flex;gap:7px;padding:0 12px;margin-bottom:8px}
.th-btn{flex:1;padding:11px;border-radius:var(--rs);border:1.5px solid var(--b);background:var(--bg2);color:var(--t2);font-size:12px;font-family:var(--font);cursor:pointer;text-align:center;transition:.14s}
.th-btn.on{border-color:var(--a);color:var(--t);background:var(--bg3)}

.iprev{position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:100;display:none;align-items:center;justify-content:center}
.iprev.on{display:flex}
.iprev img{max-width:95vw;max-height:90vh;object-fit:contain;border-radius:10px}
.iprev-x{position:absolute;top:14px;right:14px;width:34px;height:34px;background:rgba(255,255,255,.1);border:none;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer}
.iprev-x svg{width:16px;height:16px}

#toast{position:fixed;bottom:calc(var(--nav)+12px);left:50%;transform:translateX(-50%) translateY(8px);background:var(--bg2);border:1px solid var(--b2);color:var(--t);padding:9px 18px;border-radius:20px;font-size:13px;font-weight:500;white-space:nowrap;opacity:0;transition:.2s;z-index:9998;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.4)}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── ВЫДЕЛЕНИЕ ЧАТОВ (всегда белый) ── */
.ci.sel { background: #ffffff !important; }
.ci.sel .ci-name { color: #080808 !important; }
.ci.sel .ci-last { color: #444 !important; }
.ci.sel .ci-time { color: #666 !important; }

/* ── ВЫДЕЛЕНИЕ СООБЩЕНИЙ (всегда белый outline) ── */
.mw.sel .bbl { box-shadow: 0 0 0 2.5px #ffffff; }

/* ── ПАНЕЛЬ ВЫДЕЛЕНИЯ ЧАТОВ ── */
.csel-bar {
  position: fixed; top: 0; left: 0; right: 0; height: 58px;
  background: var(--bg2); border-bottom: 1px solid var(--b);
  display: none; align-items: center; padding: 0 14px; gap: 10px;
  z-index: 50;
}
.csel-bar.on { display: flex; }

/* ── ПАНЕЛЬ ВЫДЕЛЕНИЯ СООБЩЕНИЙ ── */
.msel-bar {
  position: fixed; top: 0; left: 0; right: 0; height: 58px;
  background: var(--bg2); border-bottom: 1px solid var(--b);
  display: none; align-items: center; padding: 0 14px; gap: 10px;
  z-index: 55;
}
.msel-bar.on { display: flex; }

.sel-bar-x { background: transparent; border: none; color: var(--t2); font-size: 22px; cursor: pointer; padding: 4px 6px; line-height: 1; }
.sel-bar-count { flex: 1; font-size: 15px; font-weight: 600; }
.sel-bar-del { background: var(--red); color: #fff; border: none; border-radius: 10px; padding: 8px 16px; font-size: 13px; font-weight: 600; font-family: var(--font); cursor: pointer; }
.sel-bar-del:active { opacity: .8; }

/* ── ПОПАП СООБЩЕНИЯ ── */
.mpop {
  position: fixed; z-index: 200;
  background: var(--bg2); border: 1px solid var(--b2);
  border-radius: 16px; padding: 6px 4px;
  min-width: 190px; box-shadow: 0 8px 36px rgba(0,0,0,.75);
  display: none; flex-direction: column;
}
.mpop.on { display: flex; animation: mpopIn .14s cubic-bezier(.34,1.56,.64,1); }
.mpop-reacts { display: flex; justify-content: space-around; padding: 8px 6px 10px; border-bottom: 1px solid var(--b); }
.mpop-reacts span { font-size: 24px; cursor: pointer; user-select: none; transition: transform .1s; padding: 2px 4px; border-radius: 8px; }
.mpop-reacts span:active { transform: scale(1.35); }
.mpop-row { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-radius: 10px; cursor: pointer; font-size: 14px; transition: background .1s; }
.mpop-row:active { background: var(--bg3); }
.mpop-row svg { width: 16px; height: 16px; color: var(--t2); flex-shrink: 0; }

/* ── CONFIRM ── */
.conf-ovl {
  position: fixed; inset: 0; background: rgba(0,0,0,.82);
  z-index: 300; display: none; align-items: center; justify-content: center;
  padding: 20px; backdrop-filter: blur(8px);
}
.conf-ovl.on { display: flex; }
.conf-box { background: var(--bg2); border-radius: 20px; padding: 22px 18px; width: 100%; max-width: 300px; animation: mpopIn .18s ease; }
.conf-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
.conf-sub { font-size: 13px; color: var(--t2); margin-bottom: 16px; line-height: 1.5; }
.conf-btn { width: 100%; padding: 12px; border-radius: var(--rs); border: none; font-size: 14px; font-weight: 600; font-family: var(--font); cursor: pointer; margin-bottom: 8px; transition: opacity .12s; }
.conf-btn:last-child { margin-bottom: 0; }
.conf-btn:active { opacity: .75; }
.conf-red { background: rgba(248,113,113,.15); color: var(--red); }
.conf-gray { background: var(--bg3); color: var(--t); }
.conf-cancel { background: transparent; color: var(--t2); }

@keyframes mpopIn { from { transform: scale(.82); opacity: 0; } to { transform: scale(1); opacity: 1; } }

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
#file-inp,#ava-inp{display:none}
</style>
</head>

<script>
const SB_URL = 'https://corqsavmdvwozwsurlji.supabase.co';
const SB_KEY = 'sb_publishable_V1snLZCPBLbYGAJZ3GzKZg_73aM6Rfb';

// ── SUPABASE REST HELPERS ──
async function sbReq(method, path, body, token) {
  const h = { 'Content-Type': 'application/json', 'apikey': SB_KEY };
  if (token) h['Authorization'] = 'Bearer ' + token;
  const r = await fetch(SB_URL + path, { method, headers: h, body: body ? JSON.stringify(body) : undefined });
  let d; try { d = await r.json(); } catch(e) { d = {}; }
  if (!r.ok) throw new Error(d.error_description || d.message || d.error || JSON.stringify(d));
  return d;
}

async function dbGet(table, filters, token, single) {
  let qs = 'select=*';
  for (const [k, v] of Object.entries(filters || {})) qs += `&${k}=${v}`;
  const h = { 'apikey': SB_KEY };
  if (token) h['Authorization'] = 'Bearer ' + token;
  if (single) h['Accept'] = 'application/vnd.pgrst.object+json';
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${qs}`, { headers: h });
  let d; try { d = await r.json(); } catch(e) { d = null; }
  if (!r.ok) return null;
  return d;
}

async function dbPost(table, body, token, prefer) {
  const h = { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Prefer': prefer || 'return=representation' };
  if (token) h['Authorization'] = 'Bearer ' + token;
  const r = await fetch(`${SB_URL}/rest/v1/${table}`, { method: 'POST', headers: h, body: JSON.stringify(body) });
  let d; try { d = await r.json(); } catch(e) { d = null; }
  if (!r.ok) { console.error('dbPost error', table, d); return null; }
  return d;
}

async function dbPatch(table, filters, body, token) {
  let qs = '';
  for (const [k, v] of Object.entries(filters || {})) qs += (qs ? '&' : '') + `${k}=${v}`;
  const h = { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Prefer': 'return=representation' };
  if (token) h['Authorization'] = 'Bearer ' + token;
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${qs}`, { method: 'PATCH', headers: h, body: JSON.stringify(body) });
  let d; try { d = await r.json(); } catch(e) { d = null; }
  return d;
}

async function dbUpsert(table, body, token) {
  const h = { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Prefer': 'return=representation,resolution=merge-duplicates' };
  if (token) h['Authorization'] = 'Bearer ' + token;
  const r = await fetch(`${SB_URL}/rest/v1/${table}`, { method: 'POST', headers: h, body: JSON.stringify(body) });
  let d; try { d = await r.json(); } catch(e) { d = null; }
  return d;
}

// ── SESSION ──
let session = null;
function getToken() { return session?.access_token || null; }
function getUser() { return session?.user || null; }

function loadSession() {
  try { session = JSON.parse(localStorage.getItem('z_sess') || 'null'); } catch(e) { session = null; }
}
function saveSession(s) {
  session = s;
  localStorage.setItem('z_sess', JSON.stringify(s));
}

let myData = null;
let cid = null, cPartner = null;
let pollChat = null, pollMsgs = null;
let lastMsgCount = 0;
let foundU = null, editT = null, pendingReg = null;

// ── UTILS ──
function SS(id) { document.querySelectorAll('.sc').forEach(s => s.classList.remove('on')); document.getElementById(id).classList.add('on'); }
function rId() { return String(1000 + Math.floor(Math.random() * 9000)); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function ini(n) { if (!n) return '?'; return n.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2); }
function hue(n) { const c = ['#1f2937','#1e1b4b','#1f1635','#0f172a','#18181b']; let h = 0; for (const ch of (n||'')) h = (h * 31 + ch.charCodeAt(0)) & 0xffff; return c[h % c.length]; }
function tFmt(ts) {
  if (!ts) return ''; const d = new Date(ts), now = new Date(), diff = now - d;
  if (diff < 60000) return 'только что';
  if (diff < 3600000) return Math.floor(diff / 60000) + 'м';
  if (d.toDateString() === now.toDateString()) return d.toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });
  return d.toLocaleDateString('ru', { day: '2-digit', month: '2-digit' });
}
function mFmt(ts) { if (!ts) return ''; return new Date(ts).toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' }); }
function setAva(el, name, url) {
  if (url) { el.innerHTML = `<img src="${url}" alt="">`; }
  else { el.textContent = ini(name); el.style.background = hue(name); el.style.color = '#fff'; }
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('on');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('on'), 2600);
}
function authErr(msg) {
  if (!msg) return 'Ошибка';
  if (msg.includes('Invalid login') || msg.includes('invalid_credentials')) return 'Неверный email или пароль';
  if (msg.includes('already registered') || msg.includes('already exists')) return 'Email уже используется';
  if (msg.includes('Password should') || msg.includes('at least')) return 'Пароль минимум 6 символов';
  if (msg.includes('Email not confirmed')) return 'Подтвердите email (проверьте почту)';
  if (msg.includes('User not found')) return 'Пользователь не найден';
  return msg;
}

// ── INIT ──
async function init() {
  loadSession();
  // Handle OAuth redirect
  const hash = window.location.hash;
  if (hash && hash.includes('access_token')) {
    const p = new URLSearchParams(hash.slice(1));
    const tok = p.get('access_token');
    if (tok) {
      try {
        const user = await sbReq('GET', '/auth/v1/user', null, tok);
        saveSession({ access_token: tok, refresh_token: p.get('refresh_token'), user });
        window.history.replaceState({}, '', window.location.pathname);
      } catch(e) {}
    }
  }
  hideLoader();
  if (session?.access_token) {
    // Verify session still valid
    try {
      const user = await sbReq('GET', '/auth/v1/user', null, session.access_token);
      session.user = user;
      await onLogin();
    } catch(e) {
      saveSession(null);
      SS('s-auth');
    }
  } else {
    SS('s-auth');
  }
}

async function onLogin() {
  const user = getUser();
  if (!user) return;
  // Load profile
  // Use raw fetch for profile check
  const profResp = await fetch(`${SB_URL}/rest/v1/profiles?id=eq.${user.id}&select=*`, {
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + getToken() }
  });
  const profData = await profResp.json();

  if (profData && profData.length > 0) {
    myData = profData[0];
  } else {
    myData = await createProfile();
  }
  setPresence(true);
  SS('s-chats');
  startChatPoll();
  renderProf();
}

async function createProfile() {
  const user = getUser();
  let sid = rId();
  for (let i = 0; i < 10; i++) {
    const r = await fetch(`${SB_URL}/rest/v1/short_ids?short_id=eq.${sid}&select=short_id`, { headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + getToken() } });
    const d = await r.json();
    if (!d || !d.length) break;
    sid = rId();
  }
  const nm = pendingReg?.display_name || user.user_metadata?.full_name || user.email?.split('@')[0] || 'User';
  pendingReg = null;
  const d = { id: user.id, display_name: nm, short_id: sid, avatar_url: user.user_metadata?.avatar_url || '', bio: '' };
  await dbPost('profiles', d, getToken());
  await dbPost('short_ids', { short_id: sid, user_id: user.id }, getToken());
  return d;
}

async function setPresence(online) {
  const user = getUser(); if (!user) return;
  await dbUpsert('presence', { user_id: user.id, online, last_seen: new Date().toISOString() }, getToken());
}
window.addEventListener('beforeunload', () => setPresence(false));
document.addEventListener('visibilitychange', () => getUser() && setPresence(!document.hidden));

// ── AUTH ──
function aTab(t) {
  document.getElementById('at-l').classList.toggle('on', t === 'l');
  document.getElementById('at-r').classList.toggle('on', t === 'r');
  document.getElementById('af-l').classList.toggle('on', t === 'l');
  document.getElementById('af-r').classList.toggle('on', t === 'r');
}

async function doLogin() {
  const em = document.getElementById('l-e').value.trim();
  const pw = document.getElementById('l-p').value;
  const err = document.getElementById('le');
  err.classList.remove('on');
  if (!em || !pw) { err.textContent = 'Заполните все поля'; err.classList.add('on'); return; }
  const btn = document.getElementById('l-btn');
  btn.disabled = true; btn.textContent = 'Входим...';
  try {
    const data = await sbReq('POST', '/auth/v1/token?grant_type=password', { email: em, password: pw });
    saveSession(data);
    await onLogin();
  } catch(e) {
    err.textContent = authErr(e.message);
    err.classList.add('on');
    btn.disabled = false; btn.textContent = 'Войти';
  }
}

async function doReg() {
  const nm  = document.getElementById('r-n').value.trim();
  const em  = document.getElementById('r-e').value.trim();
  const pw  = document.getElementById('r-p').value;
  const pw2 = document.getElementById('r-p2').value;
  const err = document.getElementById('re');
  err.classList.remove('on');
  if (!nm || !em || !pw) { err.textContent = 'Заполните все поля'; err.classList.add('on'); return; }
  if (pw !== pw2) { err.textContent = 'Пароли не совпадают'; err.classList.add('on'); return; }
  if (pw.length < 6) { err.textContent = 'Пароль минимум 6 символов'; err.classList.add('on'); return; }
  const btn = document.getElementById('r-btn');
  btn.disabled = true; btn.textContent = 'Создаём...';
  try {
    pendingReg = { display_name: nm };
    const data = await sbReq('POST', '/auth/v1/signup', { email: em, password: pw });
    if (data.access_token) {
      saveSession(data);
      await onLogin();
    } else {
      // Email confirmation required
      pendingReg = null;
      err.textContent = '';
      err.classList.remove('on');
      toast('Аккаунт создан! Войдите после подтверждения email.');
      aTab('l');
      document.getElementById('l-e').value = em;
      btn.disabled = false; btn.textContent = 'Создать аккаунт';
    }
  } catch(e) {
    pendingReg = null;
    err.textContent = authErr(e.message);
    err.classList.add('on');
    btn.disabled = false; btn.textContent = 'Создать аккаунт';
  }
}

function doGoogle() {
  window.location.href = `${SB_URL}/auth/v1/authorize?provider=google&redirect_to=${encodeURIComponent(window.location.href)}`;
}

async function doForgot(e) {
  e.preventDefault();
  const em = document.getElementById('l-e').value.trim();
  if (!em) { toast('Введите email выше'); return; }
  try { await sbReq('POST', '/auth/v1/recover', { email: em, redirect_to: window.location.href }); toast('Письмо отправлено!'); }
  catch(e) { toast('Ошибка: ' + e.message); }
}

async function doLogout() {
  setPresence(false);
  stopPolls();
  try { await sbReq('POST', '/auth/v1/logout', null, getToken()); } catch(e) {}
  saveSession(null);
  myData = null;
  SS('s-auth');
}

function uploadAva(input) {

    const url = e.target.result;
    await dbPatch('profiles', { ['id=eq.' + getUser().id]: undefined }, { avatar_url: url }, getToken());

// ── CHATS ──
function stopPolls() {
  if (pollChat) { clearInterval(pollChat); pollChat = null; }
  if (pollMsgs) { clearInterval(pollMsgs); pollMsgs = null; }
}
function startChatPoll() {
  loadChats();
  if (pollChat) clearInterval(pollChat);
  pollChat = setInterval(loadChats, 3000);
}

async function loadChats() {
  const user = getUser(); if (!user) return;
  const r = await fetch(`${SB_URL}/rest/v1/chats?participants=cs.{"${user.id}"}&select=*&order=last_message_time.desc`, {
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + getToken() }
  });
  if (!r.ok) return;
  const chats = await r.json();
  if (!Array.isArray(chats)) return;
  await drawChats(chats);
  // Unread badge
  const ur = await fetch(`${SB_URL}/rest/v1/unread?user_id=eq.${user.id}&select=count`, {
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + getToken() }
  });
  const urData = await ur.json();
  const total = Array.isArray(urData) ? urData.reduce((s, x) => s + (x.count || 0), 0) : 0;
  const badge = document.getElementById('ubadge');
  badge.textContent = total > 99 ? '99+' : total;
  badge.classList.toggle('on', total > 0);
}

async function drawChats(list) {
  const el = document.getElementById('chat-list');
  if (!list.length) {
    el.innerHTML = `<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><p>Нет чатов.<br>Нажми + чтобы начать!</p></div>`;
    return;
  }
  const user = getUser();
  const frag = document.createDocumentFragment();
  for (const chat of list) {
    const pid = chat.participants.find(p => p !== user.id);
    // Load partner profile
    const pr = await fetch(`${SB_URL}/rest/v1/profiles?id=eq.${pid}&select=*`, { headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + getToken() } });
    const prData = await pr.json();
    const partner = (prData && prData[0]) || { display_name: 'Неизвестно', avatar_url: '' };
    // Load presence
    const pres = await fetch(`${SB_URL}/rest/v1/presence?user_id=eq.${pid}&select=*`, { headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + getToken() } });
    const presData = await pres.json();
    const online = presData?.[0]?.online || false;
    // Unread
    const unrR = await fetch(`${SB_URL}/rest/v1/unread?chat_id=eq.${chat.id}&user_id=eq.${user.id}&select=count`, { headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + getToken() } });
    const unrData = await unrR.json();
    const unread = unrData?.[0]?.count || 0;

    const div = document.createElement('div');
    div.className = 'ci' + (selChats.has(chat.id) ? ' sel' : '');
    div.dataset.cid = chat.id;
    const ah = partner.avatar_url ? `<img src="${partner.avatar_url}" alt="">` : `<span>${ini(partner.display_name)}</span>`;
    div.innerHTML = `
      <div class="ava" style="background:${hue(partner.display_name)}">${ah}${online ? '<div class="odot"></div>' : ''}</div>
      <div class="ci-r">
        <div class="ci-top"><div class="ci-name">${esc(partner.display_name)}</div><div class="ci-time">${tFmt(chat.last_message_time)}</div></div>
        <div class="ci-bot"><div class="ci-last">${esc(chat.last_message || 'Начните общение')}</div>${unread ? `<div class="ci-badge">${unread}</div>` : ''}</div>
      </div>`;
    // Hold 500ms = войти в режим выбора
    let ht = null;
    div.addEventListener('pointerdown', () => {
      ht = setTimeout(() => {
        ht = null;
        selChats.add(chat.id);
        div.classList.add('sel');
        chatSelMode = true;
        updCselBar();
      }, 500);
    });
    div.addEventListener('pointerup', () => { clearTimeout(ht); ht = null; });
    div.addEventListener('pointercancel', () => { clearTimeout(ht); ht = null; });
    div.addEventListener('click', () => {
      if (chatSelMode) {
        if (selChats.has(chat.id)) { selChats.delete(chat.id); div.classList.remove('sel'); }
        else { selChats.add(chat.id); div.classList.add('sel'); }
        selChats.size === 0 ? clearChatSel() : updCselBar();
        return;
      }
      openDialog(chat.id, pid, partner);
    });
    frag.appendChild(div);
  }
  el.innerHTML = ''; el.appendChild(frag);
}

// ── DIALOG ──
async function openDialog(chatId, pid, partner) {
  cid = chatId; cPartner = { id: pid, ...partner };
  document.getElementById('d-name').textContent = partner.display_name || '—';
  setAva(document.getElementById('d-ava'), partner.display_name, partner.avatar_url);
  const pr = await fetch(`${SB_URL}/rest/v1/presence?user_id=eq.${pid}&select=*`, { headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + getToken() } });
  const prData = await pr.json();
  updSt(prData?.[0]);
  SS('s-dlg'); lastMsgCount = 0;
  await loadMsgs();
  markRead(chatId);
  if (pollMsgs) clearInterval(pollMsgs);
  pollMsgs = setInterval(async () => { await loadMsgs(); markRead(cid); }, 1500);
}

function updSt(pres) {
  const el = document.getElementById('d-st');
  if (pres?.online) { el.textContent = 'в сети'; el.className = 'dlg-st on'; }
  else if (pres?.last_seen) { el.textContent = 'был(а) ' + tFmt(pres.last_seen); el.className = 'dlg-st'; }
  else { el.textContent = ''; el.className = 'dlg-st'; }
}

function closeDialog() {
  if (pollMsgs) { clearInterval(pollMsgs); pollMsgs = null; }
  cid = null; cPartner = null; lastMsgCount = 0;
  SS('s-chats');
}

async function loadMsgs() {
  if (!cid) return;
  const r = await fetch(`${SB_URL}/rest/v1/messages?chat_id=eq.${cid}&select=*&order=created_at.asc`, {
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + getToken() }
  });
  if (!r.ok) return;
  const data = await r.json();
  if (!Array.isArray(data)) return;
  if (data.length !== lastMsgCount) {
    lastMsgCount = data.length;
    drawMsgs(data);
  }
}

async function markRead(chatId) {
  const user = getUser(); if (!user || !chatId) return;
  await fetch(`${SB_URL}/rest/v1/unread`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': 'Bearer ' + getToken(), 'Prefer': 'resolution=merge-duplicates' },
    body: JSON.stringify({ chat_id: chatId, user_id: user.id, count: 0 })
  });
}

function drawMsgs(msgs) {
  const area = document.getElementById('msgs');
  const atBot = area.scrollHeight - area.scrollTop - area.clientHeight < 80;
  if (!msgs.length) {
    area.innerHTML = `<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><p>Напишите первое сообщение!</p></div>`;
    return;
  }
  const user = getUser();
  let html = '', ld = '';
  for (const msg of msgs) {
    // Скрываем удалённые у себя
    if ((msg.deleted_for || []).includes(user?.id)) continue;
    const out = msg.sender_id === user?.id;
    const ds = new Date(msg.created_at).toLocaleDateString('ru', { day: 'numeric', month: 'long' });
    if (ds !== ld) { html += `<div class="datediv"><span>${ds}</span></div>`; ld = ds; }
    const rx = Object.entries(msg.reactions || {});
    const rh = rx.length ? `<div class="rcts">${rx.map(([e, u]) => `<div class="rchip" onclick="addReact('${msg.id}','${esc(e)}')">${e}<span>${Array.isArray(u) ? u.length : 1}</span></div>`).join('')}</div>` : '';
    const selCls = selMsgs.has(msg.id) ? ' sel' : '';
    const safeTxt = (msg.text||'').replace(/"/g,'&quot;');
    if (msg.type === 'image') {
      html += `<div class="mw ${out?'out':'in'}${selCls}" data-id="${msg.id}" data-txt=""><div class="bimg" onclick="openImg('${esc(msg.image_url||'')}')"><img src="${esc(msg.image_url||'')}" loading="lazy"></div>${rh}<div class="mmeta"><span class="mtime">${mFmt(msg.created_at)}</span>${out ? rIcon(msg.is_read) : ''}</div></div>`;
    } else {
      html += `<div class="mw ${out?'out':'in'}${selCls}" data-id="${msg.id}" data-txt="${safeTxt}"><div class="bbl">${esc(msg.text||'').replace(/\n/g,'<br>')}</div>${rh}<div class="mmeta"><span class="mtime">${mFmt(msg.created_at)}</span>${out ? rIcon(msg.is_read) : ''}</div></div>`;
    }
  }
  area.innerHTML = html;
  if (atBot || lastMsgCount <= 1) area.scrollTop = area.scrollHeight;

  // Вешаем click + hold на каждое сообщение
  area.querySelectorAll('.mw[data-id]').forEach(el => {
    const msgId = el.dataset.id;
    const msgTxt = el.dataset.txt;
    let ht = null, moved = false;

    el.addEventListener('pointerdown', () => { moved = false; ht = setTimeout(() => { ht = null; enterMsgSel(msgId, el); }, 500); });
    el.addEventListener('pointermove', () => { moved = true; clearTimeout(ht); ht = null; });
    el.addEventListener('pointerup', () => { clearTimeout(ht); ht = null; });
    el.addEventListener('pointercancel', () => { clearTimeout(ht); ht = null; });

    el.addEventListener('click', e => {
      if (moved) return;
      if (e.target.closest('.rchip,.bimg,.rdot')) return;
      if (msgSelMode) { toggleMsgSel(msgId, el); return; }
      openMpop(e, msgId, msgTxt, el);
    });
  });
}
function rIcon(r) { return `<div class="rdot ${r?'done':''}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></div>`; }

// ── SEND ──
function onIn() { document.getElementById('sbtn').disabled = !document.getElementById('mfld').innerText.trim(); }
function onKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } }

async function sendMsg() {
  const f = document.getElementById('mfld');
  const text = f.innerText.trim();
  if (!text || !cid) return;
  f.innerText = ''; document.getElementById('sbtn').disabled = true;
  const user = getUser(); const pid = cPartner?.id;
  try {
    await fetch(`${SB_URL}/rest/v1/messages`, {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': 'Bearer ' + getToken() },
      body: JSON.stringify({ chat_id: cid, sender_id: user.id, type: 'text', text, reactions: {}, is_read: false })
    });
    await fetch(`${SB_URL}/rest/v1/chats?id=eq.${cid}`, {
      method: 'PATCH', headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': 'Bearer ' + getToken() },
      body: JSON.stringify({ last_message: text, last_message_time: new Date().toISOString() })
    });
    if (pid) {
      // Increment unread for partner
      const ur = await fetch(`${SB_URL}/rest/v1/unread?chat_id=eq.${cid}&user_id=eq.${pid}&select=count`, { headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + getToken() } });
      const urD = await ur.json();
      const cnt = (urD?.[0]?.count || 0) + 1;
      await fetch(`${SB_URL}/rest/v1/unread`, {
        method: 'POST', headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': 'Bearer ' + getToken(), 'Prefer': 'resolution=merge-duplicates' },
        body: JSON.stringify({ chat_id: cid, user_id: pid, count: cnt })
      });
    }
    await loadMsgs();
  } catch(e) { toast('Ошибка отправки'); console.error(e); }
}

function sendImg(input) {
  const f = input.files[0]; if (!f || !cid) return;
  const r = new FileReader();
  r.onload = async e => {
    const user = getUser(); const pid = cPartner?.id;
    await fetch(`${SB_URL}/rest/v1/messages`, {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': 'Bearer ' + getToken() },
      body: JSON.stringify({ chat_id: cid, sender_id: user.id, type: 'image', image_url: e.target.result, reactions: {}, is_read: false })
    });
    await fetch(`${SB_URL}/rest/v1/chats?id=eq.${cid}`, {
      method: 'PATCH', headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': 'Bearer ' + getToken() },
      body: JSON.stringify({ last_message: '📷 Фото', last_message_time: new Date().toISOString() })
    });
    if (pid) {
      const ur = await fetch(`${SB_URL}/rest/v1/unread?chat_id=eq.${cid}&user_id=eq.${pid}&select=count`, { headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + getToken() } });
      const urD = await ur.json();
      await fetch(`${SB_URL}/rest/v1/unread`, {
        method: 'POST', headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': 'Bearer ' + getToken(), 'Prefer': 'resolution=merge-duplicates' },
        body: JSON.stringify({ chat_id: cid, user_id: pid, count: (urD?.[0]?.count || 0) + 1 })
      });
    }
    await loadMsgs();
  };
  r.readAsDataURL(f); input.value = '';
}

// ── REACTIONS ──
function showPick(e, msgId) {
  e.preventDefault();
  document.querySelectorAll('.rpick.on').forEach(p => p.classList.remove('on'));
  const w = e.currentTarget;
  let p = w.querySelector('.rpick');
  if (!p) {
    p = document.createElement('div'); p.className = 'rpick';
    p.innerHTML = ['❤️','👍','😂','😮','😢','🔥'].map(em => `<span onclick="addReact('${msgId}','${em}')">${em}</span>`).join('');
    w.style.position = 'relative'; w.appendChild(p);
  }
  p.classList.add('on');
  setTimeout(() => document.addEventListener('click', () => p.classList.remove('on'), { once: true }), 0);
}

async function addReact(msgId, emoji) {
  if (!cid) return;
  document.querySelectorAll('.rpick.on').forEach(p => p.classList.remove('on'));
  const user = getUser();
  const r = await fetch(`${SB_URL}/rest/v1/messages?id=eq.${msgId}&select=reactions`, { headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + getToken() } });
  const d = await r.json();
  const rx = { ...(d?.[0]?.reactions || {}) };
  const users = rx[emoji] || [];
  if (users.includes(user.id)) { rx[emoji] = users.filter(u => u !== user.id); if (!rx[emoji].length) delete rx[emoji]; }
  else { rx[emoji] = [...users, user.id]; }
  await fetch(`${SB_URL}/rest/v1/messages?id=eq.${msgId}`, {
    method: 'PATCH', headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': 'Bearer ' + getToken() },
    body: JSON.stringify({ reactions: rx })
  });
  await loadMsgs();
}

// ── NEW CHAT ──
function openNC() {
  document.getElementById('nc-ovl').classList.add('on');
  document.getElementById('fid').value = '';
  document.getElementById('fres').classList.remove('on');
  document.getElementById('ferr').classList.remove('on');
  document.getElementById('st-btn').disabled = true;
  foundU = null;
  setTimeout(() => document.getElementById('fid').focus(), 300);
}
function closeNC() { document.getElementById('nc-ovl').classList.remove('on'); }

async function onFid(input) {
  const v = input.value.replace(/\D/g, ''); input.value = v;
  const err = document.getElementById('ferr'), res = document.getElementById('fres');
  err.classList.remove('on'); res.classList.remove('on');
  document.getElementById('st-btn').disabled = true; foundU = null;
  if (v.length !== 4) return;
  if (myData?.short_id === v) { err.textContent = 'Это ваш ID'; err.classList.add('on'); return; }
  try {
    // Find by short_id
    const siR = await fetch(`${SB_URL}/rest/v1/short_ids?short_id=eq.${v}&select=*`, { headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + getToken() } });
    const siD = await siR.json();
    if (!siD || !siD.length) { err.textContent = 'Пользователь не найден'; err.classList.add('on'); return; }
    const uid = siD[0].user_id;
    const prR = await fetch(`${SB_URL}/rest/v1/profiles?id=eq.${uid}&select=*`, { headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + getToken() } });
    const prD = await prR.json();
    if (!prD || !prD.length) { err.textContent = 'Пользователь не найден'; err.classList.add('on'); return; }
    foundU = { ...prD[0] };
    setAva(document.getElementById('f-ava'), foundU.display_name, foundU.avatar_url);
    document.getElementById('f-name').textContent = foundU.display_name;
    document.getElementById('f-uid').textContent = 'ID: ' + v;
    res.classList.add('on');
    document.getElementById('st-btn').disabled = false;
  } catch(e) { err.textContent = 'Ошибка поиска'; err.classList.add('on'); console.error(e); }
}

async function startChat() {
  if (!foundU) return;
  closeNC();
  const user = getUser();
  // Check if chat already exists
  const r = await fetch(`${SB_URL}/rest/v1/chats?participants=cs.{"${user.id}"}&select=*`, { headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + getToken() } });
  const chats = await r.json();
  if (Array.isArray(chats)) {
    const existing = chats.find(c => c.participants.includes(foundU.id));
    if (existing) return openDialog(existing.id, foundU.id, foundU);
  }
  // Create new chat
  const cr = await fetch(`${SB_URL}/rest/v1/chats`, {
    method: 'POST', headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': 'Bearer ' + getToken(), 'Prefer': 'return=representation' },
    body: JSON.stringify({ participants: [user.id, foundU.id], last_message: '', last_message_time: new Date().toISOString() })
  });
  const crD = await cr.json();
  if (crD && crD[0]) {
    const chatId = crD[0].id;
    await fetch(`${SB_URL}/rest/v1/unread`, {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': 'Bearer ' + getToken() },
      body: JSON.stringify([{ chat_id: chatId, user_id: user.id, count: 0 }, { chat_id: chatId, user_id: foundU.id, count: 0 }])
    });
    openDialog(chatId, foundU.id, foundU);
  } else {
    toast('Ошибка создания чата');
  }
}

// ── EDIT ──
function openEdit(type) {
  editT = type;
  const inp = document.getElementById('ed-i'), ex = document.getElementById('ed-x');
  ex.innerHTML = '';
  if (type === 'name') { document.getElementById('ed-t').textContent = 'Изменить имя'; document.getElementById('ed-l').textContent = 'Имя'; inp.type = 'text'; inp.value = myData?.display_name || ''; }
  else if (type === 'bio') { document.getElementById('ed-t').textContent = 'Статус / Био'; document.getElementById('ed-l').textContent = 'Статус'; inp.type = 'text'; inp.value = myData?.bio || ''; }
  else if (type === 'pass') { document.getElementById('ed-t').textContent = 'Изменить пароль'; document.getElementById('ed-l').textContent = 'Новый пароль'; inp.type = 'password'; inp.value = ''; ex.innerHTML = `<div class="fld"><label>Подтверждение</label><input type="password" id="ed-p2" placeholder="Повторите пароль"></div>`; }
  document.getElementById('ed-ovl').classList.add('on');
  setTimeout(() => inp.focus(), 300);
}
function closeEdit() { document.getElementById('ed-ovl').classList.remove('on'); }
async function saveEdit() {
  const val = document.getElementById('ed-i').value.trim();
  closeEdit();
  const user = getUser(); if (!user) return;
  if (editT === 'name' && val) {
    await fetch(`${SB_URL}/rest/v1/profiles?id=eq.${user.id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': 'Bearer ' + getToken() }, body: JSON.stringify({ display_name: val }) });
    myData.display_name = val; renderProf(); toast('Имя обновлено');
  } else if (editT === 'bio') {
    await fetch(`${SB_URL}/rest/v1/profiles?id=eq.${user.id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': 'Bearer ' + getToken() }, body: JSON.stringify({ bio: val }) });
    myData.bio = val; renderProf(); toast('Статус обновлён');
  } else if (editT === 'pass') {
    const p2 = document.getElementById('ed-p2')?.value || '';
    if (val.length < 6) { toast('Минимум 6 символов'); return; }
    if (val !== p2) { toast('Пароли не совпадают'); return; }
    try { await sbReq('PUT', '/auth/v1/user', { password: val }, getToken()); toast('Пароль изменён'); }
    catch(e) { toast('Ошибка: ' + e.message); }
  }
}

function setTheme(t) {
  document.body.classList.toggle('light', t === 'light');
  document.getElementById('td').classList.toggle('on', t === 'dark');
  document.getElementById('tl').classList.toggle('on', t === 'light');

function openImg(url) { document.getElementById('iprev-img').src = url; document.getElementById('iprev').classList.add('on'); }
function closeImg() { document.getElementById('iprev').classList.remove('on'); }


// ════════════════════════════════
//  CHAT SELECT
// ════════════════════════════════
let selChats = new Set();
let chatSelMode = false;

function updCselBar() {
  const n = selChats.size;
  document.getElementById('csel-bar').classList.toggle('on', n > 0);
  document.getElementById('csel-count').textContent = n + (n===1?' чат':n<5?' чата':' чатов');
}

function clearChatSel() {
  selChats.clear(); chatSelMode = false;
  document.getElementById('csel-bar').classList.remove('on');
  document.querySelectorAll('.ci.sel').forEach(e => e.classList.remove('sel'));
}

function promptDeleteChats() {
  const n = selChats.size;
  showConf(
    `Удалить ${n}${n===1?' чат':n<5?' чата':' чатов'}?`,
    'Как удалить?',
    [
      { text: 'Удалить у всех', cls: 'conf-red',    cb: () => doDelChats(true)  },
      { text: 'Удалить у меня', cls: 'conf-gray',   cb: () => doDelChats(false) },
      { text: 'Отмена',         cls: 'conf-cancel', cb: () => {}                },
    ]
  );
}

async function doDelChats(forAll) {
  const ids = [...selChats];
  clearChatSel();
  const user = getUser();
  const H  = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + getToken() };
  const HJ = { ...H, 'Content-Type': 'application/json' };

  for (const chatId of ids) {
    if (forAll) {
      await fetch(`${SB_URL}/rest/v1/messages?chat_id=eq.${chatId}`, { method: 'DELETE', headers: H });
      await fetch(`${SB_URL}/rest/v1/unread?chat_id=eq.${chatId}`,   { method: 'DELETE', headers: H });
      await fetch(`${SB_URL}/rest/v1/chats?id=eq.${chatId}`,         { method: 'DELETE', headers: H });
    } else {
      const r = await fetch(`${SB_URL}/rest/v1/chats?id=eq.${chatId}&select=participants`, { headers: H });
      const d = await r.json();
      if (!d || !d[0]) continue;
      const newP = d[0].participants.filter(p => p !== user.id);
      if (newP.length === 0) {
        await fetch(`${SB_URL}/rest/v1/messages?chat_id=eq.${chatId}`, { method: 'DELETE', headers: H });
        await fetch(`${SB_URL}/rest/v1/unread?chat_id=eq.${chatId}`,   { method: 'DELETE', headers: H });
        await fetch(`${SB_URL}/rest/v1/chats?id=eq.${chatId}`,         { method: 'DELETE', headers: H });
      } else {
        await fetch(`${SB_URL}/rest/v1/chats?id=eq.${chatId}`, {
          method: 'PATCH', headers: HJ,
          body: JSON.stringify({ participants: newP })
        });
        await fetch(`${SB_URL}/rest/v1/unread?chat_id=eq.${chatId}&user_id=eq.${user.id}`, { method: 'DELETE', headers: H });
      }
    }
  }
  await loadChats();
}

// ════════════════════════════════
//  MSG SELECT
// ════════════════════════════════
let selMsgs = new Set();
let msgSelMode = false;

function enterMsgSel(msgId, el) {
  msgSelMode = true;
  selMsgs.add(msgId);
  el.classList.add('sel');
  updMselBar();
}

function toggleMsgSel(msgId, el) {
  if (selMsgs.has(msgId)) { selMsgs.delete(msgId); el.classList.remove('sel'); }
  else { selMsgs.add(msgId); el.classList.add('sel'); }
  selMsgs.size === 0 ? clearMsgSel() : updMselBar();
}

function updMselBar() {
  const n = selMsgs.size;
  document.getElementById('msel-bar').classList.toggle('on', n > 0);
  document.getElementById('msel-count').textContent = n + (n===1?' сообщение':n<5?' сообщения':' сообщений');
}

function clearMsgSel() {
  selMsgs.clear(); msgSelMode = false;
  document.getElementById('msel-bar').classList.remove('on');
  document.querySelectorAll('.mw.sel').forEach(e => e.classList.remove('sel'));
}

function promptDeleteMsgs() {
  const n = selMsgs.size;
  showConf(
    `Удалить ${n}${n===1?' сообщение':n<5?' сообщения':' сообщений'}?`,
    '',
    [
      { text: 'Удалить у всех', cls: 'conf-red',    cb: () => doDelMsgs(true)  },
      { text: 'Удалить у меня', cls: 'conf-gray',   cb: () => doDelMsgs(false) },
      { text: 'Отмена',         cls: 'conf-cancel', cb: () => {}               },
    ]
  );
}

async function doDelMsgs(forAll) {
  const ids = [...selMsgs];
  clearMsgSel();
  const user = getUser();
  const H  = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + getToken() };
  const HJ = { ...H, 'Content-Type': 'application/json' };

  for (const msgId of ids) {
    if (forAll) {
      await fetch(`${SB_URL}/rest/v1/messages?id=eq.${msgId}`, { method: 'DELETE', headers: H });
    } else {
      const r = await fetch(`${SB_URL}/rest/v1/messages?id=eq.${msgId}&select=deleted_for`, { headers: H });
      const d = await r.json();
      const df = [...(d?.[0]?.deleted_for || [])];
      if (!df.includes(user.id)) {
        df.push(user.id);
        await fetch(`${SB_URL}/rest/v1/messages?id=eq.${msgId}`, {
          method: 'PATCH', headers: HJ,
          body: JSON.stringify({ deleted_for: df })
        });
      }
    }
  }
  lastMsgCount = -1;
  await loadMsgs();
}

// ════════════════════════════════
//  MSG POPUP
// ════════════════════════════════
let mpopOpen = false;

function openMpop(e, msgId, msgTxt, msgEl) {
  const pop = document.getElementById('mpop');

  // Заполняем реакции
  const reacts = document.getElementById('mpop-reacts');
  reacts.innerHTML = '';
  ['♥️','🔥','👍','😍','😡','😎','👎'].forEach(em => {
    const sp = document.createElement('span');
    sp.textContent = em;
    sp.addEventListener('click', ev => {
      ev.stopPropagation();
      addReact(msgId, em);
      closeMpop();
    });
    reacts.appendChild(sp);
  });

  // Копировать
  const copyRow = document.getElementById('mpop-copy');
  copyRow.onclick = ev => {
    ev.stopPropagation();
    navigator.clipboard?.writeText(msgTxt || '').catch(() => {});
    toast('Скопировано');
    closeMpop();
  };

  // Выделить
  const selRow = document.getElementById('mpop-sel');
  selRow.onclick = ev => {
    ev.stopPropagation();
    enterMsgSel(msgId, msgEl);
    closeMpop();
  };

  // Позиционирование
  pop.classList.remove('on');
  pop.style.display = 'flex';
  pop.style.visibility = 'hidden';
  requestAnimationFrame(() => {
    const pw = pop.offsetWidth;
    const ph = pop.offsetHeight;
    const rect = msgEl.getBoundingClientRect();
    let top = rect.top - ph - 8;
    let left = e.clientX - pw / 2;
    if (top < 8) top = rect.bottom + 8;
    if (top + ph > window.innerHeight - 8) top = window.innerHeight - ph - 8;
    if (left < 8) left = 8;
    if (left + pw > window.innerWidth - 8) left = window.innerWidth - pw - 8;
    pop.style.top  = top  + 'px';
    pop.style.left = left + 'px';
    pop.style.visibility = '';
    pop.classList.add('on');
    mpopOpen = true;
  });
}

function closeMpop() {
  mpopOpen = false;
  const pop = document.getElementById('mpop');
  pop.classList.remove('on');
  pop.style.display = 'none';
}

// Клик вне попапа — закрыть. Используем capture=true чтобы перехватить до всего
document.addEventListener('click', e => {
  if (!mpopOpen) return;
  if (!document.getElementById('mpop').contains(e.target)) {
    closeMpop();
  }
}, true);

// ════════════════════════════════
//  CONFIRM
// ════════════════════════════════
function showConf(title, sub, btns) {
  document.getElementById('conf-title').textContent = title;
  document.getElementById('conf-sub').textContent   = sub;
  const el = document.getElementById('conf-btns');
  el.innerHTML = '';
  btns.forEach(b => {
    const btn = document.createElement('button');
    btn.className  = 'conf-btn ' + b.cls;
    btn.textContent = b.text;
    btn.onclick = () => { closeConf(); b.cb(); };
    el.appendChild(btn);
  });
  document.getElementById('conf-ovl').classList.add('on');
}
function closeConf() { document.getElementById('conf-ovl').classList.remove('on'); }
